spring:
  application:
    name: byby

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/byby}
    username: ${SPRING_DATASOURCE_USERNAME:byby}
    password: ${SPRING_DATASOURCE_PASSWORD:byby123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

byby:
  security:
    jwt:
      secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-minimum-256-bits-long!!}
      expiration-ms: 86400000
    cors:
      allowed-origins:
        - http://localhost:3000
        - ${FRONTEND_URL:http://localhost:3000}
        - ${BACKEND_URL:http://localhost:8080}

  supabase:
    url: ${SUPABASE_URL:}
    anon-key: ${SUPABASE_ANON_KEY:${NEXT_PUBLIC_SUPABASE_ANON_KEY:}}
    service-key: ${SUPABASE_SERVICE_KEY:}

  admin:
    bootstrap-code: ${ADMIN_BOOTSTRAP_CODE:admin-setup-code}

  claude:
    api-key: ${CLAUDE_API_KEY:}
    model: claude-3-5-haiku-20241022
    base-url: https://api.anthropic.com

---
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.byby: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      data-source-properties:
        sslmode: require
        sslrootcert: system

  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    com.byby: INFO
