spring:
  application:
    name: byby

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/byby}
    username: ${SPRING_DATASOURCE_USERNAME:byby}
    password: ${SPRING_DATASOURCE_PASSWORD:byby123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 3

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

byby:
  security:
    jwt:
      secret: ${JWT_SECRET:local-secret-for-dev-only-MUST-override-in-production}
      expiration-ms: 86400000
    swagger-secret: ${SWAGGER_SECRET:}
    cors:
      allowed-origins:
        - http://localhost:3000
        - ${FRONTEND_URL:http://localhost:3000}
        - ${RAILWAY_STATIC_URL:}
        - ${RAILWAY_PUBLIC_DOMAIN:}
        - https://tfi-26-1-archive-production.up.railway.app
        - https://cura-ewha.kr
        - https://www.cura-ewha.kr

  supabase:
    url: ${SUPABASE_URL:}
    anon-key: ${SUPABASE_ANON_KEY:${NEXT_PUBLIC_SUPABASE_ANON_KEY:}}
    service-key: ${SUPABASE_SERVICE_KEY:}

  admin:
    bootstrap-code: ${ADMIN_BOOTSTRAP_CODE:}

  center:
    # 개발자 전용 센터 등록/수정 API 시크릿
    dev-secret: ${CENTER_DEV_SECRET:}

  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/auth/kakao/callback}
    client-secret: ${KAKAO_CLIENT_SECRET:}

  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini

  google:
    service-account-json: ${GOOGLE_SERVICE_ACCOUNT_JSON:}

  octomo:
    api-key: ${OCTOMO_API_KEY:}
    check-url: ${OCTOMO_CHECK_URL:https://api.octomo.kr/v1/message/exists}
    receive-number: ${OCTOMO_RECEIVE_NUMBER:+8216663538}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    hikari:
      data-source-properties:
        prepareThreshold: 0

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.byby: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 5         # Supabase free tier 권장 (server conn 60개 공유 환경)
      minimum-idle: 1
      connection-timeout: 10000
      idle-timeout: 60000          # 1분 후 idle 커넥션 회수 (minimum-idle 초과분)
      max-lifetime: 120000         # 2분 선제 재생성 — Supabase가 닫기 전에 교체
      keepalive-time: 30000        # 30초 keepalive ping
      validation-timeout: 5000
      data-source-properties:
        sslmode: require
        sslrootcert: system
        prepareThreshold: 0        # PgBouncer Transaction Mode: 서버 측 Prepared Statement 금지
        socketTimeout: 60          # JDBC 소켓 응답 대기 60초 (초 단위)
        connectTimeout: 10         # JDBC TCP 연결 수립 타임아웃 10초

  jpa:
    hibernate:
      # Flyway 가 스키마 관리 → Hibernate DDL 비활성화
      # ddl-auto: update 는 기동 시 대량 메타데이터 쿼리로 PgBouncer 풀 고갈 유발
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul   # PostgreSQL 운영 환경 전용 — H2 테스트에서는 제외

sentry:
  dsn: ${SENTRY_DSN:}             # Railway 환경변수로 주입 — 없으면 비활성화
  environment: production
  traces-sample-rate: 0.1         # 요청의 10%만 성능 트랜잭션 수집
  send-default-pii: false         # 환자·이주민 정보 보호: IP/헤더 자동 수집 금지

logging:
  level:
    com.byby: INFO
