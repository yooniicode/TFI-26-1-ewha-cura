spring:
  application:
    name: byby

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/byby}
    username: ${SPRING_DATASOURCE_USERNAME:byby}
    password: ${SPRING_DATASOURCE_PASSWORD:byby123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 3

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

byby:
  security:
    jwt:
      secret: ${JWT_SECRET:local-dev-secret-key-change-in-production-minimum-256-bits-long!!}
      expiration-ms: 86400000
    # Swagger UI 접근 비밀번호 — 미설정 시 인증 없이 접근 가능 (로컬 개발용)
    # 운영 배포 시 반드시 설정: SWAGGER_SECRET=your-secret
    swagger-secret: ${SWAGGER_SECRET:}
    cors:
      allowed-origins:
        - http://localhost:3000
        - ${FRONTEND_URL:http://localhost:3000}
        - ${RAILWAY_STATIC_URL:}

  supabase:
    url: ${SUPABASE_URL:}
    anon-key: ${SUPABASE_ANON_KEY:${NEXT_PUBLIC_SUPABASE_ANON_KEY:}}
    service-key: ${SUPABASE_SERVICE_KEY:}

  admin:
    bootstrap-code: ${ADMIN_BOOTSTRAP_CODE:admin-setup-code}

  center:
    # 개발자 전용 센터 등록/수정 API 시크릿
    # 미설정 시 해당 API 비활성화 — 운영에서는 반드시 강한 값으로 설정
    dev-secret: ${CENTER_DEV_SECRET:}

  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}
    # 카카오 개발자 콘솔에 등록한 Redirect URI 와 정확히 일치해야 합니다
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/auth/kakao/callback}

  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.0-flash

---
spring:
  config:
    activate:
      on-profile: local

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    com.byby: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      data-source-properties:
        sslmode: require
        sslrootcert: system

  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    com.byby: INFO
