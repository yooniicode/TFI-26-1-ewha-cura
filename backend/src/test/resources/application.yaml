    jwt:
      secret: test-secret-key-minimum-256-bits-long-for-testing-only!!
      expiration-ms: 86400000
    swagger-secret: ""
    cors:
      allowed-origins:
        - http://localhost:3000

  supabase:
    url: ""
    anon-key: ""
    service-key: ""

  admin:
    bootstrap-code: test-admin-code

  center:
    dev-secret: test-center-secret

  kakao:
    rest-api-key: ""
    redirect-uri: http://localhost:3000/auth/kakao/callback

  gemini:
    api-key: ""
    model: gemini-2.0-flash
